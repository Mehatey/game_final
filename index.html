<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUARUBE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            overflow: hidden;
            cursor: none !important;
        }

        body {
            margin: 0;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        canvas {
            display: block;
        }

        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            transition: opacity 0.6s ease;
        }

        #loading-screen .title {
            color: #fff;
            font-family: monospace;
            font-size: clamp(32px, 6vw, 72px);
            letter-spacing: 10px;
            margin-bottom: 32px;
        }

        #loading-screen .dots {
            display: flex;
            gap: 10px;
        }

        #loading-screen .dot {
            width: 8px; height: 8px;
            background: #fff;
            animation: pulse 1.2s ease-in-out infinite;
        }

        #loading-screen .dot:nth-child(2) { animation-delay: 0.2s; }
        #loading-screen .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 100% { opacity: 0.15; }
            50% { opacity: 1; }
        }
    </style>
</head>

<body>
    <div id="loading-screen">
        <div class="title">SQUARUBE</div>
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <main></main>

    <script src="https://pixijs.download/release/pixi.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <script src="CustomCursor.js"></script>
    <script src="hope.js"></script>
    <script src="dialogueBox.js"></script>
    <script src="soundManager.js"></script>
    <script src="hero.js"></script>
    <script src="scene4.js"></script>
    <script src="scene4.5.js"></script>
    <script src="scene1.js"></script>
    <script src="scene2.js"></script>
    <script src="scene3.js"></script>
    <script src="scene5.js"></script>
    <script src="scene6.js"></script>
    <script src="scene7.js"></script>
    <script src="scene10.js"></script>
    <script src="onboarding.js"></script>
    <script src="finishScreen.js"></script>
    <script src="sketch.js"></script>
</body>

</html>
